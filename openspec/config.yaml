schema: spec-driven
project: ospec-workflow
version: "2.1.0"
initialized: "2026-06-10"

context: |
  Tech stack: Node.js 24 (no package.json — intentional plugin artifact)
  Architecture: VS Code Agent Plugin — Markdown/prompt-first with Node.js hook runtime
  Plugin manifest: .plugin/plugin.json | Hook declarations: hooks/hooks.json
  Hook runtime: scripts/hooks/*.js (SessionStart, PreToolUse, PreCompact, SubagentStop, Stop)
  Library modules: scripts/lib/ospec-state.js, scripts/lib/skill-registry.js
  MCP servers: context7 (docs), markitdown (PDF/doc conversion)
  Content layers: agents/, commands/, skills/, rules/, docs/, profiles/

testing:
  strict_tdd: true
  test_command: "node --test \"scripts/**/*.test.js\""
  runner: node-test
  runner_version: "node:test (Node.js 24 built-in)"
  coverage_command: ""
  coverage_available: false
  layers:
    unit: true
    integration: false
    e2e: false
  quality:
    linter: false
    type_checker: false
    formatter: false

rules:
  proposal:
    - Include rollback plan for risky changes
    - Note impact on hook lifecycle and plugin contracts
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Scope to hook runtime or prompt/Markdown layer explicitly
  design:
    - Include sequence diagrams for complex hook flows
    - Document architecture decisions with rationale
    - Distinguish between prompt-layer changes and JS runtime changes
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
    - Separate Markdown/prompt tasks from Node.js runtime tasks
  apply:
    - Follow existing code patterns (CommonJS require, node:* builtins only)
    tdd: true
    test_command: "node --test \"scripts/**/*.test.js\""
  verify:
    test_command: "node --test \"scripts/**/*.test.js\""
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
    - Update plugin.json version when behavior contracts change
