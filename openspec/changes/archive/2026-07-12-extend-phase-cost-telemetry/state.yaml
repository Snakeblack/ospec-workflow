phases:
  proposal:
    status: done
    artifact: "openspec/changes/extend-phase-cost-telemetry/proposal.md"
    summary: "Amplía phase-costs por dispatch con tokens separados, duración, tier, estado y relaunch; archive agrega el coste por fase."
    key_decisions:
      - "Modificar las capacidades existentes hooks y agents; no crear una capability nueva."
      - "Mantener fail-safe y tolerar filas C3 antiguas o incompletas sin migración."
  spec:
    status: done
    artifacts:
      - "openspec/changes/extend-phase-cost-telemetry/specs/hooks/spec.md"
      - "openspec/changes/extend-phase-cost-telemetry/specs/agents/spec.md"
    summary: "Define shape normalizado por dispatch, paridad JS/Go y Cost agregado por fase con fallbacks y compatibilidad C3."
    key_decisions:
      - "Las nuevas filas usan cuatro campos de tokens estimados; est_tokens solo se interpreta como salida legacy."
      - "Cost agrega invocaciones, relanzamientos, duración, tier/estado y tolera filas ausentes o incompletas."
  clarify:
    status: done
    summary: "Cuatro ambigüedades resueltas: contexto canónico, relaunch por fila persistida, paridad semántica y Cost basado en filas observadas."
    key_decisions:
      - "Usar enteros host cuando existan y heurística UTF-8 por segmento como fallback."
      - "Calcular relaunch bajo el mismo lock del append; un append fallido no cuenta."
      - "Comparar JS/Go semánticamente salvo ts; Cost suma preguntas desde gates.*.questions_asked."
  design:
    status: done
    artifact: "openspec/changes/extend-phase-cost-telemetry/design.md"
    summary: "Define contexto canónico, relaunch atómico y Cost O1 con paridad JS/Go y compatibilidad C3."
    key_decisions:
      - "El writer decide relaunch dentro del mismo advisory lock que lee y append la fila."
      - "models.yaml se distribuye en runtime y el launcher pasa el root al binario Go."
  tasks:
    status: done
    artifact: "openspec/changes/extend-phase-cost-telemetry/tasks.md"
    summary: "Descompone O1 en seis fases: contexto/tier, writers atómicos, espejo Go, paridad, Cost y verificación completa."
    key_decisions:
      - "Forecast alto: excepción size-exception ya aprobada; no se requiere otra decisión antes de apply."
      - "Cada unidad agrupa código con pruebas y explicita RED, GREEN, TRIANGULATE y REFACTOR."
      - "La entrega conserva límites internos U1→U4 aunque se implemente en un único PR aprobado."
  apply:
    status: done
    artifact: "openspec/changes/extend-phase-cost-telemetry/apply-progress.md"
    summary: "Implementación y remediación E1 completadas: paridad JS/Go afirma el registro completo, UTF-8, tier equivalente y ts UTC."
  verify:
    status: done
    artifact: "openspec/changes/extend-phase-cost-telemetry/verify-report.md"
    summary: "PASS tras remediación E1: paridad JS/Go de diez campos, UTF-8, tier y ts UTC; suites completas verdes."
    key_decisions:
      - "El gate 4R permanece in_progress hasta que el orquestador registre el cierre del reviewer dirigido."
  archive:
    status: done
    artifact: "openspec/changes/extend-phase-cost-telemetry/archive-report.md"
    summary: "Specs hooks/agents sincronizadas; ADR de models.yaml promovido; reporte Cost sin datos y copia preparada para cierre del orquestador."
