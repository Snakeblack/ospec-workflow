assumptions:
  - id: sdd-apply-001
    phase: sdd-apply
    statement: "key_decisions is treated as an optional pass-through field on the result-envelope fence (not a required §D field), defaulting to [] when absent."
    reversibility: high
    basis: "Design's setPhaseSummary signature takes keyDecisions but does not specify its source field on the envelope; §D's required-field table correctly omits it."
    recorded_at: 2026-07-03T23:59:00Z
    status: unresolved
  - id: sdd-apply-002
    phase: sdd-apply
    statement: "SubagentStop parity fixtures use a literal __SUBAGENT_STOP_FIXTURE_WORKSPACE__ placeholder token in stdin.cwd, substituted by both harnesses with a checked-in openspec-free workspace path before spawning/dispatching."
    reversibility: high
    basis: "Static JSON fixtures cannot embed a portable machine-specific absolute path, yet design requires cwd to resolve to a workspace with no active change so the parity run never mutates a real state.yaml."
    recorded_at: 2026-07-03T23:59:00Z
    status: unresolved
  - id: sdd-apply-003
    phase: sdd-apply
    statement: "escapeYamlDoubleQuoted truncates the raw value by Unicode code point to 160 chars BEFORE escaping control characters, rather than escaping first and truncating the escaped string."
    reversibility: high
    basis: "Escaping-then-truncating-the-escaped-string can split a freshly-inserted 2-char escape sequence (e.g. \\n) in half, leaving a dangling backslash immediately before the closing quote — re-opening the exact YAML line-injection vector this fix closes. Truncate-raw-by-code-point-then-escape is provably safe and also satisfies the code-point-safe-truncation WARNING in the same fix."
    recorded_at: 2026-07-04T14:45:00Z
    status: unresolved
