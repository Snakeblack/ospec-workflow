  branch: feat/selective-4r-generalist-review
route:
  intended_route: standard
  actual_route: standard
  route_rationale: "classification=normal and project.status=active select the standard route; O4+O5 change review dispatch behavior, persisted review evidence, and specialist escalation across multiple harness targets."
  validated: true
  validation_errors: []
execution_mode: auto
delivery_strategy: exception-ok
