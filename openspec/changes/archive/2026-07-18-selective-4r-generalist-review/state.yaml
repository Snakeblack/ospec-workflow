  evidence_fingerprint: "sha256:7a6fb118b62c0e349fd62a54c520e830fba4bfff3ca9c3c6941d6f10492930f9"
  selected_dimensions: [risk, reliability]
  correction_budget_lines: 200
  failed_attempts: 0
  findings_frozen: true
  findings_summary: "0 BLOCKER, 4 CRITICAL, 2 WARNING, 0 SUGGESTION"
  frozen_findings:
    - {id: "F-6f5e393a8b157764", owner: risk, severity: CRITICAL}
    - {id: "F-2b96d08ed32d339f", owner: risk, severity: CRITICAL}
    - {id: "F-2c1cace471637df9", owner: reliability, severity: CRITICAL}
