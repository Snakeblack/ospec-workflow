  lineage_status: correction-required
  revision: 5
  lineage_artifact: "openspec/changes/selective-4r-generalist-review/review-lineage.json"
  lineage_id: "sha256:0efad15565f18ec50c832fa83813514ed9f07f5163d49d9201014f412f946e1e"
