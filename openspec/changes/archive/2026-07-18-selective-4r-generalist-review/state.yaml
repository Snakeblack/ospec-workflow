  lifecycle: "one-shot lenses -> frozen findings -> bounded correction -> targeted validation"
  failed_validation_cap: 3
  correction_budget_policy: "min(200, ceil(original_changed_lines / 2))"
  historical_remediation: "R1-R9 preserved as audit history and not converted into lineage attempts"
approvals:
  - id: architecture-bounded-review-001
    gate: architecture
    decision: "Adoptar el ciclo bounded de gentle-ai: ejecutar cada lens una vez, congelar findings, limitar correcciones, validar solo los findings congelados y registrar observaciones tardías como follow-ups no bloqueantes."
    source: vscode/askQuestions
    accepted_at: 2026-07-16T08:57:53Z
    applies_to:
      - sdd-design
      - sdd-tasks
      - sdd-apply
      - sdd-verify
phases:
  sdd-propose:
    status: done
    artifact: "openspec/changes/selective-4r-generalist-review/proposal.md"
    summary: "O4+O5: generalist review plus deterministic 0-2 specialist selection for normal changes and full 4R for high-risk."
    key_decisions:
      - "Preserve the existing post-verify gate and severity escalation policy."
      - "Persist per-dimension selection reasons derived from normalized evidence."
  sdd-spec:
    status: done
    artifacts:
      - "openspec/changes/selective-4r-generalist-review/specs/agents/spec.md"
      - "openspec/changes/selective-4r-generalist-review/specs/routing/spec.md"
      - "openspec/changes/selective-4r-generalist-review/specs/skills/spec.md"
    summary: "O4+O5 bounded review: genesis and findings frozen, one sweep per dimension, targeted validation, and three-attempt limit."
    key_decisions:
      - "Each selected dimension executes once per lineage; correction validation cannot reopen general discovery."
      - "Only frozen finding IDs may block; late observations are non-blocking follow-ups unless a successor grants authority."
      - "Three failed attempts exhaust the immutable budget; downstream gates only revalidate persisted identity and state."
  clarify:
    status: skipped
  sdd-design:
    status: done
    artifact: "openspec/changes/selective-4r-generalist-review/design.md"
    summary: "Bounded immutable lineage: one-shot lenses, frozen findings, three correction failures, targeted validation, and explicit successors."
    key_decisions:
      - "Pure review-lineage reducer owns immutable genesis, legal transitions, budgets, and terminal outcomes."
      - "Owner rereview is removed; only scoped validation of frozen finding IDs may follow a correction."
      - "Downstream gates are read-only; new review authority requires an explicit successor lineage."
  sdd-tasks:
    status: done
    artifact: "openspec/changes/selective-4r-generalist-review/tasks.md"
    summary: "E1 planifica una reparación evidence-only: 20 filas B1 individuales, marcadores TDD honestos y validación mecánica 20/20."
    key_decisions:
      - "Las 20 tareas B1 y R1-R9 permanecen completadas e inmutables; E1 solo amplía su audit trail."
      - "No se reconstruye ningún RED: evidencia ausente bloquea E1 y se registra como DEFERRED solo cuando corresponde honestamente."
      - "Una comprobación de conjuntos exige 20/20 antes de una única repetición de sdd-verify, sin reviewers."
  sdd-apply:
    status: done
    artifact: "openspec/changes/selective-4r-generalist-review/apply-progress.md"
    summary: "E1 completó la reparación evidence-only: 20/20 filas B1 individuales, marcadores Strict TDD válidos y cero cambios de código, tests o discovery review."
    key_decisions:
      - "No owner/generalist rereview after findings freeze; only review-correction may validate frozen IDs."
      - "Three failed targeted validations, including zero-delta, exhaust the lineage."
      - "The actual lineage starts only after successful verify freezes the then-current candidate."
      - "La comprobación mecánica confirmó 20 IDs hoja, 20 filas únicas, sin faltantes, extras, duplicados ni marcadores inválidos."
  sdd-verify:
    status: done
    artifact: "openspec/changes/selective-4r-generalist-review/verify-report.md"
    summary: "PASS: E1 aporta evidencia Strict TDD individual 20/20; 60/60 focales, npm test y 31/31 escenarios pasan en cinco targets sin findings."
    key_decisions:
      - "No reviewer or remediation cycle was launched; the single authorized rerun was bounded to evidence, source, focused tests and npm test."
      - "E1 is evidence-only: exactly 20 unique B1 leaf rows with valid RED/GREEN or admitted static rationale."
      - "Behavioral contract passes 31/31 scenarios across all five targets; receipt publication and durable lock/CAS remain out of scope."
