    applies_to:
      - sdd-orchestrator
  - id: delivery-strategy-001
    gate: delivery-strategy
    decision: single-pr
    source: vscode/askQuestions
    accepted_at: 2026-06-17T00:00:00Z
    applies_to:
      - sdd-tasks
      - sdd-apply
  - id: review-workload-001
    gate: review-workload
    decision: feature-branch-chain
    source: vscode/askQuestions
    accepted_at: 2026-06-17T00:00:00Z
    rationale: >
      tasks forecast ~580–650 net lines across 13 files, exceeds the 400-line
      budget. User chose a chained delivery over size:exception. sdd-apply
      implements only the next autonomous slice per run, using work-unit commits.
    applies_to:
      - sdd-apply

chain:
  strategy: feature-branch-chain
  order: [WU1, WU2, WU3, WU4, WU5, WU6]
  slices:
    - id: WU1
      scope: workspace-atlas.js marker read/merge/serialize + loadAtlas regeneration branch + Phase 1 regression baseline
      risk: high
      status: done
    - id: WU2
      scope: federation-marker.js enroll (idempotent, atomic)
      depends_on: [WU1]
      status: done
    - id: WU3
      scope: sdd-init container detection + target_dir via ## Parameters
      depends_on: [WU1]
      status: done
    - id: WU4
      scope: sdd-workspace enroll + explore subcommand
      depends_on: [WU1, WU2]
      status: done
    - id: WU5
      scope: .gitignore, persistence-contract.md, orchestrator note, final verification
      depends_on: [WU1, WU2, WU3, WU4]
      status: done
    - id: WU6
      scope: security fix — path-traversal containment guard (isWithinRoot + scanMemberMarkers boundary)
      depends_on: [WU1, WU4]
      risk: high
      remediates: risk-critical-001
      status: done
  delivered: true

open_decisions: []
