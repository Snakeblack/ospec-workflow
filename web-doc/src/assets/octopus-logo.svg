<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Ospec-Workflow octopus logo">
  <defs>
    <linearGradient id="octopus-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>

  <!-- tentacles -->
  <g fill="none" stroke="url(#octopus-body)" stroke-width="4.5" stroke-linecap="round">
    <path d="M14 34 C 8 40, 8 48, 14 54"/>
    <path d="M22 38 C 18 46, 20 52, 26 56"/>
    <path d="M30 40 C 28 48, 30 54, 34 58"/>
    <path d="M38 40 C 40 48, 38 54, 34 58" opacity="0"/>
    <path d="M40 38 C 44 46, 42 52, 36 56"/>
    <path d="M48 34 C 54 40, 54 48, 48 54"/>
    <path d="M18 30 C 10 32, 6 38, 8 44"/>
    <path d="M46 30 C 54 32, 58 38, 56 44"/>
  </g>

  <!-- head -->
  <ellipse cx="32" cy="26" rx="20" ry="17" fill="url(#octopus-body)"/>

  <!-- eyes -->
  <circle cx="25" cy="24" r="3.6" fill="#ffffff"/>
  <circle cx="39" cy="24" r="3.6" fill="#ffffff"/>
  <circle cx="25" cy="24" r="1.6" fill="#1e1b2e"/>
  <circle cx="39" cy="24" r="1.6" fill="#1e1b2e"/>
</svg>
