name: Publish Marketplace

# End users cannot install the repo directly: the canonical source is in VS Code
# format and the `claude` target transform (agent/command renames, tool mapping,
# model resolution, rules-into-orchestrator) is mandatory. This workflow builds
# the marketplace and publishes the BUILT artifact to the orphan `release`
# branch for marketplace clients without a clone or local Node installation.
#
# Validation is intentionally skipped here (--no-validate): the `claude` CLI is
# not available in CI, and the Validate Harness workflow already gates source.

on:
  release:
    types: [released]
  workflow_dispatch:

# Needs write to push the release branch; nothing else.
permissions:
  contents: write

concurrency:
  group: publish-marketplace
  cancel-in-progress: true

jobs:
  publish:
    name: Build and publish marketplace
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Build marketplaces
        run: |
          node scripts/configure/claude-marketplace.js --no-validate
          node scripts/configure/codex-marketplace.js --out dist/claude-marketplace --no-validate

      # The hooks invoke scripts/hooks/ospec-hooks-launch.js, which prefers the
      # compiled Go binary and falls back to the Node hooks. Bundle every
      # supported platform binary into the published tree so the launcher finds a
      # native binary on each host; without this the release ships a launcher
      # with no binary to prefer (the Node fallback still runs, but the fast path
      # is unavailable). The binaries are gitignored at source, so they reach
      # users only through this published `release` branch.
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'

      - name: Bundle ospec-hooks binaries
        env:
          CGO_ENABLED: '0'
        run: |
          hooks_dir="dist/claude-marketplace/plugins/ospec-workflow/scripts/hooks"
          mkdir -p "$hooks_dir"
          for tuple in windows:amd64:.exe darwin:arm64: darwin:amd64: linux:amd64:; do
            IFS=':' read -r goos goarch ext <<< "$tuple"
            GOOS="$goos" GOARCH="$goarch" \
              go build -o "$hooks_dir/ospec-hooks-${goos}-${goarch}${ext}" ./cmd/ospec-hooks
          done
          ls -la "$hooks_dir"

      - name: Publish to release branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dist/claude-marketplace
          git init -q
          git checkout -q -b release
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "publish marketplace from ${GITHUB_SHA}"
          git push -q --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" release

      - name: Smoke test published Codex marketplace
        env:
          HOME: ${{ runner.temp }}/codex-home
        run: |
          npm install -g @openai/codex
          codex plugin marketplace add ${GITHUB_REPOSITORY} --ref release --sparse .agents/plugins --sparse plugins/codex/ospec-workflow
          codex plugin marketplace list | grep -F ospec-tools
